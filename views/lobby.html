<div class="header-section">
    <h1>☆ 宇宙大厅 ☆</h1>
    <p class="welcome-msg">所有星门在此交汇。浏览现有房间，或开启一扇通往新世界的大门。</p>
</div>

<div class="card">
    <h2>◇ 创建房间</h2>
    <p>选择房间类型，设置房间号与密码（留空则为公开房）。</p>
    <div class="form-row">
        <label>房间类型：</label>
        <select id="lobby-type">
            <option value="chat">💬 聊天室</option>
            <option value="oekaki">🎨 茶绘房间</option>
            <option value="pictionary">🖍️ 你画我猜</option>
            <option value="fc">🎮 FC 游戏室</option>
        </select>
    </div>
    <div class="form-row">
        <label>昵称：</label>
        <input type="text" id="lobby-nick" placeholder="宇宙旅人" maxlength="16">
    </div>
    <div class="form-row">
        <label>房间号：</label>
        <input type="text" id="lobby-room" placeholder="留空则随机生成" maxlength="16">
    </div>
    <div class="form-row">
        <label>密码：</label>
        <input type="password" id="lobby-pwd" placeholder="公开房请留空" maxlength="16">
    </div>
    <div class="form-row">
        <button class="btn" id="lobby-create">创建房间</button>
    </div>
</div>

<div class="card">
    <h2>◇ 房间列表 <span class="room-count" id="room-count">(0)</span></h2>
    <p>点击房间卡片即可进入。🔒 表示需要密码。</p>
    <div class="room-grid" id="lobby-room-list">
        <div class="room-card" style="cursor:default;">
            <p style="color:#7777aa;">当前没有开放的房间，快去创建一个吧！</p>
        </div>
    </div>
</div>

<script>
(function() {
    if (window.initLobby) window.initLobby();
})();
</script>
