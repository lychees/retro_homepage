<div class="card gallery-section">
    <h2>◇ 星间画廊</h2>
    <p class="gallery-intro">
        这里陈列着大家从茶绘房间与 FC 游戏室投递过来的作品。<br>
        点击缩略图可以放大查看，继续向下滚动会自动加载更多。
    </p>

    <div class="gallery-filter">
        <button class="btn small active" data-filter="all">全部</button>
        <button class="btn small" data-filter="oekaki">茶绘</button>
        <button class="btn small" data-filter="fc">FC</button>
    </div>

    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="gallery-empty" id="gallery-empty" style="display:none;">还没有作品，快去茶绘房间投稿吧 ✨</div>
    <div class="gallery-more" id="gallery-more" style="display:none;">
        <button class="btn secondary" id="gallery-load-more">加载更多</button>
    </div>
</div>

<div class="gallery-modal" id="gallery-modal" style="display:none;">
    <div class="gallery-modal-backdrop" id="gallery-modal-backdrop"></div>
    <div class="gallery-modal-content">
        <button class="gallery-modal-close" id="gallery-modal-close">×</button>
        <img id="gallery-modal-img" src="" alt="">
        <div class="gallery-modal-info">
            <h3 id="gallery-modal-title"></h3>
            <p>作者：<span id="gallery-modal-author"></span> · 投稿时间：<span id="gallery-modal-time"></span></p>
            <div class="gallery-modal-actions">
                <button class="btn small" id="gallery-modal-like">❤️ 点赞 <span id="gallery-modal-like-count">0</span></button>
            </div>
            <div class="gallery-modal-comments">
                <h4>评论</h4>
                <ul id="gallery-modal-comment-list"></ul>
                <div class="gallery-comment-form">
                    <input type="text" id="gallery-comment-author" placeholder="昵称" maxlength="16">
                    <input type="text" id="gallery-comment-text" placeholder="写下你的评论…" maxlength="200">
                    <button class="btn small" id="gallery-comment-submit">发送</button>
                </div>
            </div>
        </div>
    </div>
</div>
