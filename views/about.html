<div class="card about-section">
    <h2>◇ 关于星間茶室</h2>
    <p>
        星間茶室是一个以「宇宙与星空」为主题的个人主页。
        设计语言参考了 <a href="https://yachiyo.net/" target="_blank" style="color:#00ffff">yachiyo.net</a> 的复古站点风格，
        并融入了深空、星云与霓虹元素。
    </p>
    <p>
        本站提供三种房间：
    </p>
    <ul>
        <li><strong>聊天室</strong>：实时文字聊天。</li>
        <li><strong>茶绘房间</strong>：多人同步画板，支持画笔、橡皮、颜色与笔刷粗细。</li>
        <li><strong>FC 游戏室</strong>：使用 jsnes 模拟器运行 NES ROM，通过 Socket.io 同步玩家输入，实现联机对战。</li>
    </ul>
    <p>
        技术栈：Node.js + Express + Socket.io + jsnes。
    </p>
</div>
