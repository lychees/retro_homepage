<div class="card">
    <div id="pictionary-lobby">
        <h2>◇ 你画我猜</h2>
        <p>一人作画，其他人根据画的内容猜词。猜对得分！</p>
        <div class="form-row">
            <label>昵称：</label>
            <input type="text" id="pictionary-nick" placeholder="小画家" maxlength="16">
        </div>
        <div class="form-row">
            <label>房间号：</label>
            <input type="text" id="pictionary-room" placeholder="留空则创建新房间" maxlength="16">
        </div>
        <div class="form-row">
            <label>密码：</label>
            <input type="password" id="pictionary-pwd" placeholder="公开房请留空" maxlength="16">
        </div>
        <div class="form-row">
            <button class="btn secondary" id="pictionary-create">创建 / 加入房间</button>
        </div>
    </div>

    <div id="pictionary-room-view" style="display:none;">
        <div class="room-header">
            <h2>🎨 你画我猜 <span id="pictionary-room-id"></span></h2>
            <div class="room-info">在线人数：<span id="pictionary-online">0</span></div>
        </div>
        <div class="pictionary-layout">
            <div class="pictionary-tools">
                <div id="pictionary-draw-tools" class="draw-tools"></div>

                <div class="pictionary-word-box" id="pictionary-word-box" style="margin-top:12px;">
                    <div class="word-label">当前题目</div>
                    <div class="word-content" id="pictionary-word">等待开始…</div>
                </div>
                <div class="pictionary-timer" id="pictionary-timer">--</div>
                <button class="btn secondary" id="pictionary-start" style="width:100%;margin-top:8px;">开始游戏</button>
            </div>
            <div class="pictionary-canvas-area">
                <div class="pictionary-drawer-banner" id="pictionary-drawer-banner">等待开始…</div>
                <canvas id="pictionary-canvas" class="pictionary-canvas" width="640" height="480"></canvas>
                <div class="pictionary-status" id="pictionary-status">等待房主开始游戏</div>
            </div>
            <div class="pictionary-right">
                <div class="pictionary-users">
                    <h4>玩家得分</h4>
                    <ul class="user-list" id="pictionary-users"></ul>
                </div>
                <div class="pictionary-chat">
                    <h4>房间消息</h4>
                    <div class="chat-messages" id="pictionary-chat-messages" style="height:180px;margin-bottom:8px;"></div>
                    <div class="chat-input-area">
                        <input type="text" id="pictionary-guess-input" placeholder="输入你的猜测" maxlength="50" style="flex:1;font-size:16px;padding:6px;">
                        <button class="btn" id="pictionary-guess-send" style="padding:6px 10px;">猜</button>
                    </div>
                </div>
                <div class="pictionary-sidebar">
                    <h4>房间音乐</h4>
                    <audio id="pictionary-audio" controls style="width:100%;margin-bottom:6px;"></audio>
                    <label class="btn secondary" for="pictionary-audio-file" style="width:100%;margin-bottom:6px;display:block;text-align:center;cursor:pointer;">🎵 选择音乐</label>
                    <input type="file" id="pictionary-audio-file" accept="audio/*" style="display:none;">

                    <h4>操作</h4>
                    <button class="btn secondary" id="pictionary-replay" style="width:100%;margin-bottom:6px;">🎬 回放</button>
                    <button class="btn secondary" id="pictionary-undo" style="width:100%;margin-bottom:6px;">↩️ 撤销</button>
                    <button class="btn secondary" id="pictionary-export" style="width:100%;margin-bottom:6px;">📤 导出过程</button>
                    <label class="btn secondary" for="pictionary-import" style="width:100%;margin-bottom:6px;display:block;text-align:center;cursor:pointer;">📥 导入过程</label>
                    <input type="file" id="pictionary-import" accept=".json,.oekaki" style="display:none;">
                    <button class="btn secondary" id="pictionary-download" style="width:100%;margin-bottom:6px;">保存画作</button>
                    <button class="btn secondary" id="pictionary-submit" style="width:100%;margin-bottom:6px;">🖼️ 投稿画廊</button>
                    <button class="btn danger" id="pictionary-leave" style="width:100%;">离开房间</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    if (window.initPictionary) window.initPictionary();
})();
</script>
