<div class="card">
    <div id="oekaki-lobby">
        <h2>◇ 茶绘房间</h2>
        <p>多人实时画板。选择颜色与笔刷，和朋友们一起涂鸦。</p>
        <div class="form-row">
            <label>昵称：</label>
            <input type="text" id="oekaki-nick" placeholder="涂鸦星人" maxlength="16">
        </div>
        <div class="form-row">
            <label>房间号：</label>
            <input type="text" id="oekaki-room" placeholder="留空则创建新房间" maxlength="16">
        </div>
        <div class="form-row">
            <label>密码：</label>
            <input type="password" id="oekaki-pwd" placeholder="公开房请留空" maxlength="16">
        </div>
        <div class="form-row">
            <button class="btn secondary" id="oekaki-create">创建 / 加入茶绘</button>
        </div>
    </div>

    <div id="oekaki-room-view" style="display:none;">
        <div class="room-header">
            <h2>🎨 茶绘房间 <span id="oekaki-room-id"></span></h2>
            <div class="room-info">在线人数：<span id="oekaki-online">0</span></div>
        </div>
        <div class="oekaki-layout">
            <div class="oekaki-tools">
                <div class="tool-row">
                    <div class="tool-btn active" data-tool="pen" title="画笔">✏️</div>
                    <div class="tool-btn" data-tool="eraser" title="橡皮">🧼</div>
                    <div class="tool-btn" data-tool="text" title="文字">T</div>
                    <div class="tool-btn" data-tool="eyedropper" title="取色器">💧</div>
                </div>
                <div class="tool-btn" id="oekaki-clear" title="清空" style="width:100%;margin-top:6px;">🗑️ 清空</div>

                <div class="color-wheel-title">调色环</div>
                <canvas id="oekaki-color-wheel" class="color-wheel" width="140" height="140"></canvas>
                <div class="current-color-box" id="oekaki-current-color" style="background:#000000;"></div>
                <div class="alpha-row">
                    <label for="oekaki-alpha">不透明度</label>
                    <input type="range" id="oekaki-alpha" min="0" max="100" value="100">
                    <span id="oekaki-alpha-value">100%</span>
                </div>
                <div class="color-presets-title">常用颜色（点击使用，新选色自动覆盖）</div>
                <div class="color-presets" id="oekaki-color-presets"></div>

                <div class="brush-title">粗细</div>
                <div class="brush-size" id="brush-sizes">
                    <span style="width:4px;height:4px;" data-size="2"></span>
                    <span style="width:8px;height:8px;" data-size="4" class="active"></span>
                    <span style="width:12px;height:12px;" data-size="8"></span>
                    <span style="width:18px;height:18px;" data-size="16"></span>
                </div>
            </div>
            <div class="oekaki-canvas-area">
                <canvas id="oekaki-canvas" class="oekaki-canvas" width="640" height="480"></canvas>
            </div>
            <div class="oekaki-right">
                <div class="oekaki-layers">
                    <h4>图层</h4>
                    <ul class="layer-list" id="oekaki-layer-list"></ul>
                    <div class="layer-opacity-row">
                        <label>图层不透明度</label>
                        <input type="range" id="oekaki-layer-opacity" min="0" max="100" value="100">
                        <span id="oekaki-layer-opacity-value">100%</span>
                    </div>
                    <div class="layer-actions">
                        <button class="btn small" id="oekaki-add-layer">+ 新建</button>
                        <button class="btn small" id="oekaki-rename-layer">重命名</button>
                        <button class="btn small danger" id="oekaki-del-layer">删除</button>
                    </div>
                    <p class="layer-hint">拖拽图层可调整上下顺序</p>
                </div>
                <div class="oekaki-sidebar">
                    <h4>在线画手</h4>
                    <ul class="user-list" id="oekaki-users"></ul>
                    <h4 style="margin-top:12px;">房间聊天</h4>
                    <div class="chat-messages" id="oekaki-chat-messages" style="height:120px;margin-bottom:8px;"></div>
                    <div class="chat-input-area" style="margin-top:0;">
                        <input type="text" id="oekaki-chat-input" placeholder="按回车发送" maxlength="200" style="flex:1;font-size:16px;padding:6px;">
                        <button class="btn" id="oekaki-chat-send" style="padding:6px 10px;">发送</button>
                    </div>

                    <h4 style="margin-top:12px;">操作</h4>
                    <button class="btn secondary" id="oekaki-replay" style="width:100%;margin-bottom:6px;">🎬 回放</button>
                    <button class="btn secondary" id="oekaki-undo" style="width:100%;margin-bottom:6px;">↩️ 撤销 (Ctrl+Z)</button>
                    <button class="btn secondary" id="oekaki-export" style="width:100%;margin-bottom:6px;">📤 导出过程</button>
                    <label class="btn secondary" for="oekaki-import" style="width:100%;margin-bottom:6px;display:block;text-align:center;cursor:pointer;">📥 导入过程</label>
                    <input type="file" id="oekaki-import" accept=".json,.oekaki" style="display:none;">
                    <button class="btn secondary" id="oekaki-download" style="width:100%;margin-bottom:6px;">保存画作</button>
                    <button class="btn secondary" id="oekaki-submit" style="width:100%;margin-bottom:6px;">🖼️ 投稿画廊</button>
                    <button class="btn danger" id="oekaki-leave" style="width:100%;">离开房间</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    if (window.initOekaki) window.initOekaki();
})();
</script>
